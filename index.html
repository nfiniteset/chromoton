<html>

<head>
  <meta charset="utf-8">
  <title>Software for One</title>
  <style>
    html {
      height: 100%;
    }

    body {
      background-color: rgb(40, 40, 40);
      margin: 0;
      padding: 0;
      font-family: Futura, Helvetica, Arial, san-serif;
      color: #eee;
      overflow: hidden;
      height: 100%;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .slide {
      position: absolute;
      top: 0;
      color: #eee;
      overflow: hidden;
    }

    .chromoton {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 0;
    }

    .chromoton canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #controls-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      max-height: calc(100vh - 40px);
      width: 220px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 24px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 100;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.3s ease-out, color 0.4s ease;
      transform: translateX(0);
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    #controls-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.1) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    #controls-panel.hidden {
      transform: translateX(calc(100% + 20px));
    }

    #controls-panel::-webkit-scrollbar {
      width: 6px;
    }

    #controls-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #controls-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    #controls-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #controls-panel h2 {
      margin: 0 0 4px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
      position: relative;
      z-index: 1;
      transition: color 0.4s ease;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      color: rgba(255, 255, 255, 0.75);
      transition: color 0.4s ease;
    }

    .control-label span.value {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      font-variant-numeric: tabular-nums;
      transition: color 0.4s ease;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
      transition: background 0.4s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #eee;
      cursor: pointer;
      transition: background 0.4s ease;
    }

    .color-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.75);
      transition: color 0.4s ease;
    }

    .randomize-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: color 0.4s ease;
    }

    .randomize-label input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      position: relative;
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .randomize-label input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: inherit;
      font-size: 12px;
      font-weight: bold;
    }

    #color-swatch-wrap {
      position: relative;
      width: 100%;
      height: 32px;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    #color-swatch {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    #color-swatch-wrap:hover #color-swatch {
      border-color: rgba(255, 255, 255, 0.4);
    }

    #color-picker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }
  </style>
  <script type="text/javascript" src="chromoton.js" charset="utf-8"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
</head>

<body>

  <div class="interactive chromoton" data-runner="chromoton">
    <canvas class="chromotons" width="640" height="640"></canvas>
  </div>

  <div id="controls-panel">
    <h2>Chromoton</h2>

    <div class="control-group">
      <div class="control-label">
        <span>Color Palette</span>
      </div>
      <select id="palette-select" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.4s ease, border-color 0.4s ease;">
        <option value="custom">Custom</option>
      </select>
    </div>

    <div class="control-group">
      <div class="color-row">
        <span>Target Colors</span>
        <label class="randomize-label">
          <input type="checkbox" id="randomize-cb" checked> Randomize
        </label>
      </div>
      <div id="colors-list"></div>
      <button id="add-color-btn" style="width: 100%; padding: 6px; margin-top: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.4s ease, border-color 0.4s ease;">+ Add Color</button>
    </div>

    <hr style="border: none; border-top: 1px solid rgba(255, 255, 255, 0.08); margin: 12px 0; position: relative; z-index: 1; transition: border-top-color 0.4s ease;">

    <div class="control-group">
      <label class="randomize-label" style="justify-content: flex-start;">
        <input type="checkbox" id="more-settings-cb"> More Settings
      </label>
    </div>

    <div id="advanced-controls" style="display: none;">
      <div class="control-group">
        <div class="control-label">
          <span>Clarity</span>
          <span class="value" id="clarity-val">240</span>
        </div>
        <input type="range" id="clarity-slider" min="20" max="300" step="1" value="240">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Mutation Rate</span>
          <span class="value" id="mutation-val">0.002</span>
        </div>
        <input type="range" id="mutation-slider" min="0" max="0.05" step="0.0005" value="0.002">
      </div>
    </div>
  </div>

</body>
<foot>
  <script>
    var container = document.body.getElementsByClassName('chromoton')[0];
    chromoton.init();
    chromoton.show(container);

    // --- Palette picker ---
    var paletteSelect = document.getElementById('palette-select');

    // Populate palette options
    var palettes = chromoton.getPalettes();
    palettes.forEach(function (paletteName) {
      if (paletteName !== 'custom') {  // Skip custom, it's already in HTML
        var option = document.createElement('option');
        option.value = paletteName;
        option.textContent = paletteName.charAt(0).toUpperCase() + paletteName.slice(1);
        paletteSelect.appendChild(option);
      }
    });

    // Set initial palette selector value to match randomly selected palette
    paletteSelect.value = chromoton.getCurrentPalette();

    // Handle palette changes
    paletteSelect.addEventListener('change', function () {
      chromoton.setPalette(paletteSelect.value);
    });

    // --- Clarity slider (debounced — requires reinit) ---
    var claritySlider = document.getElementById('clarity-slider');
    var clarityVal    = document.getElementById('clarity-val');
    var dimDebounce;

    function applyClarity() {
      clearTimeout(dimDebounce);
      dimDebounce = setTimeout(function () {
        var width = parseInt(claritySlider.value);

        // Calculate height to maintain square cells based on viewport aspect ratio
        var containerWidth = container.clientWidth;
        var containerHeight = container.clientHeight;
        var aspectRatio = containerHeight / containerWidth;
        var height = Math.round(width * aspectRatio);

        chromoton.configure({
          width: width,
          height: height
        });
      }, 400);
    }

    claritySlider.addEventListener('input', function () {
      clarityVal.textContent = claritySlider.value;
      applyClarity();
    });

    // Initialize with responsive dimensions
    applyClarity();

    // Recalculate on window resize
    window.addEventListener('resize', applyClarity);

    // --- Mutation rate slider (live) ---
    var mutationSlider = document.getElementById('mutation-slider');
    var mutationVal    = document.getElementById('mutation-val');

    mutationSlider.addEventListener('input', function () {
      var rate = parseFloat(mutationSlider.value);
      mutationVal.textContent = rate.toFixed(4);
      chromoton.setMutationRate(rate);
    });

    // --- Color controls ---
    var randomizeCb  = document.getElementById('randomize-cb');
    var colorsList   = document.getElementById('colors-list');
    var addColorBtn  = document.getElementById('add-color-btn');

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(function (v) {
        return v.toString(16).padStart(2, '0');
      }).join('');
    }

    function renderColorsList() {
      var colors = chromoton.getColors();
      colorsList.innerHTML = '';

      colors.forEach(function (color, index) {
        var colorItem = document.createElement('div');
        colorItem.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px; align-items: center;';

        var swatchWrap = document.createElement('div');
        swatchWrap.style.cssText = 'position: relative; flex: 1; height: 32px; border-radius: 2px; overflow: hidden; cursor: pointer;';

        var swatch = document.createElement('div');
        swatch.className = 'color-swatch-border';
        swatch.style.cssText = 'width: 100%; height: 100%; border-radius: 2px; border: 1px solid rgba(255, 255, 255, 0.2); box-sizing: border-box; transition: border-color 0.4s ease; background: rgb(' + color.r + ',' + color.g + ',' + color.b + ')';

        var picker = document.createElement('input');
        picker.type = 'color';
        picker.value = rgbToHex(color.r, color.g, color.b);
        picker.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0;';
        picker.dataset.index = index;

        picker.addEventListener('input', function () {
          var hex = picker.value;
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          swatch.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
          randomizeCb.checked = false;
          chromoton.setRandomizeColor(false);
          chromoton.setColor(r, g, b, parseInt(picker.dataset.index));
        });

        swatchWrap.appendChild(swatch);
        swatchWrap.appendChild(picker);

        if (colors.length > 1) {
          var removeBtn = document.createElement('button');
          removeBtn.textContent = '×';
          removeBtn.style.cssText = 'width: 32px; height: 32px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 18px; line-height: 1; padding: 0; transition: color 0.4s ease, border-color 0.4s ease;';
          removeBtn.dataset.index = index;
          removeBtn.addEventListener('click', function () {
            chromoton.removeTargetColor(parseInt(removeBtn.dataset.index));
            renderColorsList();
          });
          colorItem.appendChild(swatchWrap);
          colorItem.appendChild(removeBtn);
        } else {
          colorItem.appendChild(swatchWrap);
        }

        colorsList.appendChild(colorItem);
      });

      // Update add button state based on color count (max 5)
      addColorBtn.disabled = colors.length >= 5;
      addColorBtn.style.opacity = colors.length >= 5 ? '0.5' : '1';
      addColorBtn.style.cursor = colors.length >= 5 ? 'not-allowed' : 'pointer';
    }

    // Sync swatches when simulation randomizes colors.
    chromoton.setColorChangeCallback(function (colors) {
      renderColorsList();
    });

    // Init swatches with current target colors.
    renderColorsList();

    // Add new color
    addColorBtn.addEventListener('click', function () {
      var color = chromoton.getUniqueRandomColor();
      chromoton.addTargetColor(color.red, color.green, color.blue);
      renderColorsList();
    });

    // Toggling randomize starts or stops auto-color changes.
    randomizeCb.addEventListener('change', function () {
      chromoton.setRandomizeColor(randomizeCb.checked);
    });

    // --- More Settings toggle ---
    var moreSettingsCb = document.getElementById('more-settings-cb');
    var advancedControls = document.getElementById('advanced-controls');

    moreSettingsCb.addEventListener('change', function () {
      if (moreSettingsCb.checked) {
        advancedControls.style.display = 'block';
      } else {
        advancedControls.style.display = 'none';
      }
    });

    // --- Auto-hide/show sidebar ---
    var controlsPanel = document.getElementById('controls-panel');
    var hideTimer;
    var HIDE_DELAY = 500; // half second
    var EDGE_THRESHOLD = 220; // pixels from right edge to trigger show

    function showSidebar() {
      controlsPanel.classList.remove('hidden');
      clearTimeout(hideTimer);
    }

    function scheduleSidebarHide() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        controlsPanel.classList.add('hidden');
      }, HIDE_DELAY);
    }

    // Show sidebar when mouse enters it
    controlsPanel.addEventListener('mouseenter', function () {
      showSidebar();
    });

    // Schedule hide when mouse leaves sidebar
    controlsPanel.addEventListener('mouseleave', function () {
      scheduleSidebarHide();
    });

    // Show sidebar when mouse approaches right edge
    document.addEventListener('mousemove', function (e) {
      var distanceFromRight = window.innerWidth - e.clientX;
      if (distanceFromRight <= EDGE_THRESHOLD) {
        showSidebar();
      }
    });

    // Start with sidebar visible for 3 seconds on page load
    hideTimer = setTimeout(function () {
      controlsPanel.classList.add('hidden');
    }, 3000);

    // --- Dynamic Contrast for Sidebar ---
    console.log('Contrast code loaded');

    function sampleCanvasColorBehindSidebar() {
      var canvas = document.querySelector('.chromotons');
      if (!canvas) return null;

      var ctx = canvas.getContext('2d', { willReadFrequently: true });
      if (!ctx) return null;

      // Get sidebar position and dimensions
      var sidebarRect = controlsPanel.getBoundingClientRect();
      var canvasRect = canvas.getBoundingClientRect();

      // Calculate sampling area in canvas coordinates
      var scaleX = canvas.width / canvasRect.width;
      var scaleY = canvas.height / canvasRect.height;

      var sampleX = (sidebarRect.left - canvasRect.left) * scaleX;
      var sampleY = (sidebarRect.top - canvasRect.top) * scaleY;
      var sampleWidth = sidebarRect.width * scaleX;
      var sampleHeight = sidebarRect.height * scaleY;

      // Ensure coordinates are within canvas bounds
      sampleX = Math.max(0, Math.min(sampleX, canvas.width - 1));
      sampleY = Math.max(0, Math.min(sampleY, canvas.height - 1));
      sampleWidth = Math.min(sampleWidth, canvas.width - sampleX);
      sampleHeight = Math.min(sampleHeight, canvas.height - sampleY);

      // Sample multiple points across the sidebar area
      var samplePoints = 30;
      var totalR = 0, totalG = 0, totalB = 0;
      var validSamples = 0;

      for (var i = 0; i < samplePoints; i++) {
        var x = Math.floor(sampleX + (sampleWidth / samplePoints) * i + sampleWidth / (samplePoints * 2));
        var y = Math.floor(sampleY + sampleHeight / 2);

        try {
          var imageData = ctx.getImageData(x, y, 1, 1);
          totalR += imageData.data[0];
          totalG += imageData.data[1];
          totalB += imageData.data[2];
          validSamples++;
        } catch (e) {
          // Skip if sampling fails
        }
      }

      if (validSamples === 0) return null;

      return {
        r: Math.round(totalR / validSamples),
        g: Math.round(totalG / validSamples),
        b: Math.round(totalB / validSamples)
      };
    }

    function updateSidebarContrast() {
      // Check if chroma is loaded
      if (typeof chroma === 'undefined') {
        console.log('Chroma not loaded yet');
        return;
      }

      var rawColor = sampleCanvasColorBehindSidebar();
      if (!rawColor) {
        console.log('Could not sample canvas');
        return;
      }

      // Simulate the backdrop-filter: saturate(180%)
      // Convert to HSL, increase saturation, convert back
      var color = chroma(rawColor.r, rawColor.g, rawColor.b);
      var hsl = color.hsl();
      if (!isNaN(hsl[1])) {
        hsl[1] = Math.min(1, hsl[1] * 1.8); // saturate(180%)
        color = chroma.hsl(hsl[0], hsl[1], hsl[2]);
      }

      var rgb = color.rgb();

      // Blend with the white overlay: rgba(255, 255, 255, 0.08)
      var overlayAlpha = 0.08;
      var bgColor = {
        r: Math.round(rgb[0] * (1 - overlayAlpha) + 255 * overlayAlpha),
        g: Math.round(rgb[1] * (1 - overlayAlpha) + 255 * overlayAlpha),
        b: Math.round(rgb[2] * (1 - overlayAlpha) + 255 * overlayAlpha)
      };

      // Use chroma.js to calculate contrast
      var bgChroma = chroma(bgColor.r, bgColor.g, bgColor.b);
      var contrastWithWhite = chroma.contrast(bgChroma, 'white');
      var contrastWithBlack = chroma.contrast(bgChroma, 'black');

      // Debug logging (enable with: window.contrastDebug = true)
      if (window.contrastDebug) {
        console.log('BG Color:', bgColor, 'White contrast:', contrastWithWhite.toFixed(2), 'Black contrast:', contrastWithBlack.toFixed(2));
      }

      // Choose the color with better contrast
      var textColor = contrastWithWhite > contrastWithBlack ? '#ffffff' : '#000000';
      var textColorAlpha = contrastWithWhite > contrastWithBlack ? 'rgba(255, 255, 255, 0.75)' : 'rgba(0, 0, 0, 0.75)';
      var textColorFaded = contrastWithWhite > contrastWithBlack ? 'rgba(255, 255, 255, 0.45)' : 'rgba(0, 0, 0, 0.45)';
      var textColorHeader = contrastWithWhite > contrastWithBlack ? 'rgba(255, 255, 255, 0.35)' : 'rgba(0, 0, 0, 0.35)';
      var borderColor = contrastWithWhite > contrastWithBlack ? 'rgba(255, 255, 255, 0.15)' : 'rgba(0, 0, 0, 0.15)';
      var borderColorHover = contrastWithWhite > contrastWithBlack ? 'rgba(255, 255, 255, 0.4)' : 'rgba(0, 0, 0, 0.4)';
      var sliderThumb = contrastWithWhite > contrastWithBlack ? '#eee' : '#222';

      // Apply colors to sidebar elements
      controlsPanel.style.color = textColor;

      // Update all text elements
      var h2Elements = controlsPanel.querySelectorAll('h2');
      h2Elements.forEach(function (h2) {
        h2.style.color = textColorHeader;
      });

      var labels = controlsPanel.querySelectorAll('.control-label');
      labels.forEach(function (label) {
        label.style.color = textColorAlpha;
      });

      var valueSpans = controlsPanel.querySelectorAll('.control-label span.value');
      valueSpans.forEach(function (span) {
        span.style.color = textColorFaded;
      });

      var colorRowSpans = controlsPanel.querySelectorAll('.color-row span');
      colorRowSpans.forEach(function (span) {
        span.style.color = textColorAlpha;
      });

      var randomizeLabels = controlsPanel.querySelectorAll('.randomize-label');
      randomizeLabels.forEach(function (label) {
        label.style.color = textColorFaded;
      });

      // Update input elements
      var rangeInputs = controlsPanel.querySelectorAll('input[type="range"]');
      rangeInputs.forEach(function (input) {
        input.style.background = borderColor;
      });

      var checkboxes = controlsPanel.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(function (checkbox) {
        checkbox.style.borderColor = borderColorHover;
        checkbox.style.color = textColor;
      });

      // Update select and buttons
      var select = controlsPanel.querySelector('#palette-select');
      if (select) {
        select.style.color = textColor;
        select.style.borderColor = borderColorHover;
      }

      var buttons = controlsPanel.querySelectorAll('button');
      buttons.forEach(function (button) {
        button.style.color = textColor;
        button.style.borderColor = borderColorHover;
      });

      // Update dynamically created color swatches
      var swatches = colorsList.querySelectorAll('.color-swatch-border');
      swatches.forEach(function (swatch) {
        swatch.style.borderColor = borderColorHover;
      });

      // Update HR
      var hr = controlsPanel.querySelector('hr');
      if (hr) {
        hr.style.borderTopColor = borderColor;
      }

      // Update slider thumb color dynamically
      var styleId = 'dynamic-slider-styles';
      var existingStyle = document.getElementById(styleId);
      if (existingStyle) {
        existingStyle.remove();
      }

      var style = document.createElement('style');
      style.id = styleId;
      style.textContent = `
        #controls-panel input[type="range"]::-webkit-slider-thumb {
          background: ${sliderThumb} !important;
        }
        #controls-panel input[type="range"]::-moz-range-thumb {
          background: ${sliderThumb} !important;
        }
      `;
      document.head.appendChild(style);
    }

    // Update contrast periodically as the animation changes
    // Wait for chroma to load before starting
    function startContrastUpdates() {
      console.log('startContrastUpdates called, chroma is:', typeof chroma);
      if (typeof chroma !== 'undefined') {
        console.log('Starting contrast updates!');
        setInterval(updateSidebarContrast, 100);
        updateSidebarContrast(); // Initial update
      } else {
        console.log('Chroma not ready, retrying...');
        // Retry after a short delay
        setTimeout(startContrastUpdates, 50);
      }
    }
    console.log('About to call startContrastUpdates');
    startContrastUpdates();
  </script>
</foot>

</html>
