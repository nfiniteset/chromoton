<html>

<head>
  <meta charset="utf-8">
  <title>Software for One</title>
  <style>
    html {
      height: 100%;
    }

    body {
      background-color: rgb(40, 40, 40);
      margin: 0;
      padding: 0;
      font-family: Futura, Helvetica, Arial, san-serif;
      color: #eee;
      overflow: hidden;
      height: 100%;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .slide {
      position: absolute;
      top: 0;
      color: #eee;
      overflow: hidden;
    }

    .chromoton {
      position: relative;
      margin: 0;
      padding: 0;
      height: 10vh;
    }

    .chromoton canvas {
      display: block;
      margin: 0 auto;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 100%;
      image-rendering: pixelated;
    }

    #controls-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 220px;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(6px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 100;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #controls-panel h2 {
      margin: 0 0 4px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      color: rgba(255, 255, 255, 0.75);
    }

    .control-label span.value {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #eee;
      cursor: pointer;
    }

    .color-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.75);
    }

    .randomize-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .randomize-label input[type="checkbox"] {
      cursor: pointer;
      accent-color: #eee;
    }

    #color-swatch-wrap {
      position: relative;
      width: 100%;
      height: 32px;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    #color-swatch {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    #color-swatch-wrap:hover #color-swatch {
      border-color: rgba(255, 255, 255, 0.4);
    }

    #color-picker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }
  </style>
  <script type="text/javascript" src="chromoton.js" charset="utf-8"></script>
</head>

<body>

  <div class="interactive chromoton" data-runner="chromoton">
    <canvas class="chromotons" width="640" height="640"></canvas>
  </div>

  <div id="controls-panel">
    <h2>Simulation</h2>

    <div class="control-group">
      <div class="control-label">
        <span>Grid Width</span>
        <span class="value" id="width-val">120</span>
      </div>
      <input type="range" id="width-slider" min="20" max="300" step="1" value="120">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Grid Height</span>
        <span class="value" id="height-val">80</span>
      </div>
      <input type="range" id="height-slider" min="20" max="200" step="1" value="80">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Mutation Rate</span>
        <span class="value" id="mutation-val">0.002</span>
      </div>
      <input type="range" id="mutation-slider" min="0" max="0.05" step="0.0005" value="0.002">
    </div>

    <div class="control-group">
      <div class="color-row">
        <span>Target Color</span>
        <label class="randomize-label">
          <input type="checkbox" id="randomize-cb" checked> Randomize
        </label>
      </div>
      <div id="color-swatch-wrap">
        <div id="color-swatch"></div>
        <input type="color" id="color-picker">
      </div>
    </div>
  </div>

</body>
<foot>
  <script>
    var container = document.body.getElementsByClassName('chromoton')[0];
    chromoton.init();
    chromoton.show(container);

    // --- Grid dimension sliders (debounced — requires reinit) ---
    var widthSlider  = document.getElementById('width-slider');
    var heightSlider = document.getElementById('height-slider');
    var widthVal     = document.getElementById('width-val');
    var heightVal    = document.getElementById('height-val');
    var dimDebounce;

    function applyDimensions() {
      clearTimeout(dimDebounce);
      dimDebounce = setTimeout(function () {
        chromoton.configure({
          width: parseInt(widthSlider.value),
          height: parseInt(heightSlider.value)
        });
      }, 400);
    }

    widthSlider.addEventListener('input', function () {
      widthVal.textContent = widthSlider.value;
      applyDimensions();
    });

    heightSlider.addEventListener('input', function () {
      heightVal.textContent = heightSlider.value;
      applyDimensions();
    });

    // --- Mutation rate slider (live) ---
    var mutationSlider = document.getElementById('mutation-slider');
    var mutationVal    = document.getElementById('mutation-val');

    mutationSlider.addEventListener('input', function () {
      var rate = parseFloat(mutationSlider.value);
      mutationVal.textContent = rate.toFixed(4);
      chromoton.setMutationRate(rate);
    });

    // --- Color controls ---
    var randomizeCb  = document.getElementById('randomize-cb');
    var colorSwatch  = document.getElementById('color-swatch');
    var colorPicker  = document.getElementById('color-picker');

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(function (v) {
        return v.toString(16).padStart(2, '0');
      }).join('');
    }

    function updateSwatch(r, g, b) {
      colorSwatch.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
      colorPicker.value = rgbToHex(r, g, b);
    }

    // Sync swatch when simulation randomizes color.
    chromoton.setColorChangeCallback(function (r, g, b) {
      updateSwatch(r, g, b);
    });

    // Init swatch with current target color.
    var initial = chromoton.getColor();
    updateSwatch(initial.r, initial.g, initial.b);

    // Picking a color stops randomize and sets the target.
    colorPicker.addEventListener('input', function () {
      var hex = colorPicker.value;
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      updateSwatch(r, g, b);
      randomizeCb.checked = false;
      chromoton.setRandomizeColor(false);
      chromoton.setColor(r, g, b);
    });

    // Toggling randomize starts or stops auto-color changes.
    randomizeCb.addEventListener('change', function () {
      chromoton.setRandomizeColor(randomizeCb.checked);
    });
  </script>
</foot>

</html>
