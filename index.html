<html>

<head>
  <meta charset="utf-8">
  <title>Software for One</title>
  <style>
    html {
      height: 100%;
    }

    body {
      background-color: rgb(40, 40, 40);
      margin: 0;
      padding: 0;
      font-family: Futura, Helvetica, Arial, san-serif;
      color: #eee;
      overflow: hidden;
      height: 100%;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .slide {
      position: absolute;
      top: 0;
      color: #eee;
      overflow: hidden;
    }

    .chromoton {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 0;
    }

    .chromoton canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #controls-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      max-height: calc(100vh - 40px);
      width: 220px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 24px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 100;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.3s ease-out;
      transform: translateX(0);
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    #controls-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.1) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    #controls-panel.hidden {
      transform: translateX(calc(100% + 20px));
    }

    #controls-panel::-webkit-scrollbar {
      width: 6px;
    }

    #controls-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #controls-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    #controls-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    #controls-panel h2 {
      margin: 0 0 4px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
      position: relative;
      z-index: 1;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      color: rgba(255, 255, 255, 0.75);
    }

    .control-label span.value {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #eee;
      cursor: pointer;
    }

    .color-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.75);
    }

    .randomize-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .randomize-label input[type="checkbox"] {
      cursor: pointer;
      accent-color: #eee;
    }

    #color-swatch-wrap {
      position: relative;
      width: 100%;
      height: 32px;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }

    #color-swatch {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }

    #color-swatch-wrap:hover #color-swatch {
      border-color: rgba(255, 255, 255, 0.4);
    }

    #color-picker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }
  </style>
  <script type="text/javascript" src="chromoton.js" charset="utf-8"></script>
</head>

<body>

  <div class="interactive chromoton" data-runner="chromoton">
    <canvas class="chromotons" width="640" height="640"></canvas>
  </div>

  <div id="controls-panel">
    <h2>Simulation</h2>

    <div class="control-group">
      <div class="control-label">
        <span>Clarity</span>
        <span class="value" id="clarity-val">240</span>
      </div>
      <input type="range" id="clarity-slider" min="20" max="300" step="1" value="240">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Mutation Rate</span>
        <span class="value" id="mutation-val">0.002</span>
      </div>
      <input type="range" id="mutation-slider" min="0" max="0.05" step="0.0005" value="0.002">
    </div>

    <hr style="border: none; border-top: 1px solid rgba(255, 255, 255, 0.08); margin: 12px 0; position: relative; z-index: 1;">

    <div class="control-group">
      <div class="control-label">
        <span>Color Palette</span>
      </div>
      <select id="palette-select" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;">
        <option value="custom">Custom</option>
      </select>
    </div>

    <div class="control-group">
      <div class="color-row">
        <span>Target Colors</span>
        <label class="randomize-label">
          <input type="checkbox" id="randomize-cb" checked> Randomize
        </label>
      </div>
      <div id="colors-list"></div>
      <button id="add-color-btn" style="width: 100%; padding: 6px; margin-top: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;">+ Add Color</button>
    </div>
  </div>

</body>
<foot>
  <script>
    var container = document.body.getElementsByClassName('chromoton')[0];
    chromoton.init();
    chromoton.show(container);

    // --- Palette picker ---
    var paletteSelect = document.getElementById('palette-select');

    // Populate palette options
    var palettes = chromoton.getPalettes();
    palettes.forEach(function (paletteName) {
      if (paletteName !== 'custom') {  // Skip custom, it's already in HTML
        var option = document.createElement('option');
        option.value = paletteName;
        option.textContent = paletteName.charAt(0).toUpperCase() + paletteName.slice(1);
        paletteSelect.appendChild(option);
      }
    });

    // Set initial palette selector value to match randomly selected palette
    paletteSelect.value = chromoton.getCurrentPalette();

    // Handle palette changes
    paletteSelect.addEventListener('change', function () {
      chromoton.setPalette(paletteSelect.value);
    });

    // --- Clarity slider (debounced — requires reinit) ---
    var claritySlider = document.getElementById('clarity-slider');
    var clarityVal    = document.getElementById('clarity-val');
    var dimDebounce;

    function applyClarity() {
      clearTimeout(dimDebounce);
      dimDebounce = setTimeout(function () {
        var width = parseInt(claritySlider.value);

        // Calculate height to maintain square cells based on viewport aspect ratio
        var containerWidth = container.clientWidth;
        var containerHeight = container.clientHeight;
        var aspectRatio = containerHeight / containerWidth;
        var height = Math.round(width * aspectRatio);

        chromoton.configure({
          width: width,
          height: height
        });
      }, 400);
    }

    claritySlider.addEventListener('input', function () {
      clarityVal.textContent = claritySlider.value;
      applyClarity();
    });

    // Initialize with responsive dimensions
    applyClarity();

    // Recalculate on window resize
    window.addEventListener('resize', applyClarity);

    // --- Mutation rate slider (live) ---
    var mutationSlider = document.getElementById('mutation-slider');
    var mutationVal    = document.getElementById('mutation-val');

    mutationSlider.addEventListener('input', function () {
      var rate = parseFloat(mutationSlider.value);
      mutationVal.textContent = rate.toFixed(4);
      chromoton.setMutationRate(rate);
    });

    // --- Color controls ---
    var randomizeCb  = document.getElementById('randomize-cb');
    var colorsList   = document.getElementById('colors-list');
    var addColorBtn  = document.getElementById('add-color-btn');

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(function (v) {
        return v.toString(16).padStart(2, '0');
      }).join('');
    }

    function renderColorsList() {
      var colors = chromoton.getColors();
      colorsList.innerHTML = '';

      colors.forEach(function (color, index) {
        var colorItem = document.createElement('div');
        colorItem.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px; align-items: center;';

        var swatchWrap = document.createElement('div');
        swatchWrap.style.cssText = 'position: relative; flex: 1; height: 32px; border-radius: 2px; overflow: hidden; cursor: pointer;';

        var swatch = document.createElement('div');
        swatch.style.cssText = 'width: 100%; height: 100%; border-radius: 2px; border: 1px solid rgba(255, 255, 255, 0.15); box-sizing: border-box; transition: border-color 0.15s; background: rgb(' + color.r + ',' + color.g + ',' + color.b + ')';

        var picker = document.createElement('input');
        picker.type = 'color';
        picker.value = rgbToHex(color.r, color.g, color.b);
        picker.style.cssText = 'position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; padding: 0;';
        picker.dataset.index = index;

        picker.addEventListener('input', function () {
          var hex = picker.value;
          var r = parseInt(hex.slice(1, 3), 16);
          var g = parseInt(hex.slice(3, 5), 16);
          var b = parseInt(hex.slice(5, 7), 16);
          swatch.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
          randomizeCb.checked = false;
          chromoton.setRandomizeColor(false);
          chromoton.setColor(r, g, b, parseInt(picker.dataset.index));
        });

        swatchWrap.appendChild(swatch);
        swatchWrap.appendChild(picker);

        if (colors.length > 1) {
          var removeBtn = document.createElement('button');
          removeBtn.textContent = '×';
          removeBtn.style.cssText = 'width: 32px; height: 32px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #eee; cursor: pointer; border-radius: 2px; font-size: 18px; line-height: 1; padding: 0;';
          removeBtn.dataset.index = index;
          removeBtn.addEventListener('click', function () {
            chromoton.removeTargetColor(parseInt(removeBtn.dataset.index));
            renderColorsList();
          });
          colorItem.appendChild(swatchWrap);
          colorItem.appendChild(removeBtn);
        } else {
          colorItem.appendChild(swatchWrap);
        }

        colorsList.appendChild(colorItem);
      });

      // Update add button state based on color count (max 5)
      addColorBtn.disabled = colors.length >= 5;
      addColorBtn.style.opacity = colors.length >= 5 ? '0.5' : '1';
      addColorBtn.style.cursor = colors.length >= 5 ? 'not-allowed' : 'pointer';
    }

    // Sync swatches when simulation randomizes colors.
    chromoton.setColorChangeCallback(function (colors) {
      renderColorsList();
    });

    // Init swatches with current target colors.
    renderColorsList();

    // Add new color
    addColorBtn.addEventListener('click', function () {
      var color = chromoton.getUniqueRandomColor();
      chromoton.addTargetColor(color.red, color.green, color.blue);
      renderColorsList();
    });

    // Toggling randomize starts or stops auto-color changes.
    randomizeCb.addEventListener('change', function () {
      chromoton.setRandomizeColor(randomizeCb.checked);
    });

    // --- Auto-hide/show sidebar ---
    var controlsPanel = document.getElementById('controls-panel');
    var hideTimer;
    var HIDE_DELAY = 500; // half second
    var EDGE_THRESHOLD = 220; // pixels from right edge to trigger show

    function showSidebar() {
      controlsPanel.classList.remove('hidden');
      clearTimeout(hideTimer);
    }

    function scheduleSidebarHide() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        controlsPanel.classList.add('hidden');
      }, HIDE_DELAY);
    }

    // Show sidebar when mouse enters it
    controlsPanel.addEventListener('mouseenter', function () {
      showSidebar();
    });

    // Schedule hide when mouse leaves sidebar
    controlsPanel.addEventListener('mouseleave', function () {
      scheduleSidebarHide();
    });

    // Show sidebar when mouse approaches right edge
    document.addEventListener('mousemove', function (e) {
      var distanceFromRight = window.innerWidth - e.clientX;
      if (distanceFromRight <= EDGE_THRESHOLD) {
        showSidebar();
      }
    });

    // Start with sidebar visible for 3 seconds on page load
    hideTimer = setTimeout(function () {
      controlsPanel.classList.add('hidden');
    }, 3000);
  </script>
</foot>

</html>
